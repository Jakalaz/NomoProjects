
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nomo Trading & Projects</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    /* ================================
       GLOBAL STYLES
    ================================= */
    html {
      scroll-behavior: smooth;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: #f4f4f4;
      color: #333;
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* ================================
       HEADER
    ================================= */
    


header {
  background: url("Images/Nomo.jpeg") center / cover no-repeat;
  min-height: 100svh;
}

@media (max-width: 768px) {
  header {
    background-position: top center;
  }
}



    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
    }

    .header-content {
      position: relative;
      z-index: 2;
      padding: 20px;
      max-width: 800px;
    }

    header h1 {
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 600;
    }

    header p {
      margin-top: 10px;
      font-size: clamp(0.95rem, 3vw, 1.2rem);
      color: #ddd;
    }

    /* ================================
       NAVIGATION
    ================================= */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #222;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 5px 10px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #e91e63;
    }

    /* ================================
       SECTIONS
    ================================= */
    section {
      padding: 50px 15px;
      max-width: 1100px;
      margin: auto;
    }

    section h3 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
      color: #111;
    }

    /* ================================
       SERVICES GRID
    ================================= */
    .zoom-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .service {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .service img {
      border-radius: 6px;
      margin-bottom: 10px;
      transition: transform 0.3s ease;
    }

    .service img:hover {
      transform: scale(1.05);
    }

    .service h4 {
      margin: 10px 0;
      color: #e91e63;
      font-size: 1.1rem;
    }

    .service p {
      font-size: 0.95rem;
    }

    /* ================================
       FOOTER
    ================================= */
    footer {
      background: #111;
      color: #ccc;
      text-align: center;
      padding: 25px 10px;
      margin-top: 40px;
      font-size: 0.9rem;
    }

    footer a {
      color: #ccc;
      text-decoration: none;
    }
  </style>
</head>
