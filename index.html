
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nomo Trading & Projects</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    /* ================================
       GLOBAL STYLES
    ================================= */
    html {
      scroll-behavior: smooth;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: #f4f4f4;
      color: #333;
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* ================================
       HEADER
    ================================= */
    header {
      background: url("Images/Nomo.jpeg") center / cover no-repeat;
      height: 90vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
    }

    .header-content {
      position: relative;
      z-index: 2;
      padding: 20px;
      max-width: 800px;
    }

    header h1 {
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 600;
    }

    header p {
      margin-top: 10px;
      font-size: clamp(0.95rem, 3vw, 1.2rem);
      color: #ddd;
    }

    /* ================================
       NAVIGATION
    ================================= */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #222;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 5px 10px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #e91e63;
    }

    /* ================================
       SECTIONS
    ================================= */
    section {
      padding: 50px 15px;
      max-width: 1100px;
      margin: auto;
    }

    section h3 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
      color: #111;
    }

    /* ================================
       SERVICES GRID
    ================================= */
    .zoom-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .service {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .service img {
      border-radius: 6px;
      margin-bottom: 10px;
      transition: transform 0.3s ease;
    }

    .service img:hover {
      transform: scale(1.05);
    }

    .service h4 {
      margin: 10px 0;
      color: #e91e63;
      font-size: 1.1rem;
    }

    .service p {
      font-size: 0.95rem;
    }

    /* ================================
       FORM
    ================================= */
    form {
      background: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: auto;
    }

    form input,
    form select,
    form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    form button {
      width: 100%;
      background: #e91e63;
      color: #fff;
      padding: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
    }

    form button:hover {
      background: #c2185b;
    }

    /* ================================
       FOOTER
    ================================= */
    footer {
      background: #111;
      color: #ccc;
      text-align: center;
      padding: 25px 10px;
      margin-top: 40px;
      font-size: 0.9rem;
    }

    footer a {
      color: #ccc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-content">
  </div>
</header>

<!-- NAVIGATION -->
<nav>
  <a href="Services.html">Our Products & Services</a>
  <a href="Mission.html">Vision & Mission</a>
  <a href="Values.html">Values & Objectives</a>
  <a href="#contact">Contact Us</a>
</nav>

<!-- SERVICES -->
<section id="services">
  <h3>Our Services</h3>
  <div class="zoom-container">

    <article class="service">
      <a href="FullMeals.html">
        <img src="images/Nomo.jpeg" alt="Services">
      </a>
    </article>
  </div>
</section>

<!-- ORDER FORM -->
<section id="Ordering">
  <h3>Log Request</h3>

  <form id="booking-form">
    <input type="text" name="name" placeholder="Your Full Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>

    <select name="service" required>
      <option value="">Select Service</option>
      <option>Kasi Kota</option>
      <option>Hot Dog</option>
      <option>Burger</option>
      <option>Russian & Chips</option>
      <option>Drinks</option>
    </select>

    <input type="number" name="quantity" min="1" placeholder="Quantity" required>
    <input type="date" name="date" required>
    <textarea name="notes" placeholder="Extra instructions (optional)"></textarea>

    <button type="submit">Submit Order</button>
  </form>
</section>

<!-- FOOTER -->
<footer id="contact">
  <p>📞 <a href="tel:+26876907477">+268 7690 7477</a></p>
  <p>📱 <a href="https://wa.me/26876907477" target="_blank">Chat on WhatsApp</a></p>
  <p>📧 <a href="mailto:sihlegumbi10111@gmail.com">sihlegumbi10111@gmail.com</a></p>
  <p>&copy; 2025 SomK's Fast Foods & Beverages Eswatini</p>
</footer>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("2D90Dl0QS7IfvW3tN");

  document.getElementById("booking-form").addEventListener("submit", function(e){
    e.preventDefault();

    emailjs.sendForm("service_v4ktjuu", "template_kx3eo28", this)
      .then(() => {
        alert("✅ Request sent successfully!");
        this.reset();
      })
      .catch(() => {
        alert("❌ Failed to send order.");
      });
  });

  // Prevent past dates
  const dateInput = document.querySelector('input[type="date"]');
  dateInput.min = new Date().toISOString().split("T")[0];
</script>

</body>
</html>
