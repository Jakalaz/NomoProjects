
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ EmailJS v3 -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs@3/dist/email.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    nav {
      background: linear-gradient(90deg, #0b3c5d, #d7263d);
      padding: 14px;
      text-align: center;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: 600;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: #fff;
      padding: 40px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #e91e63;
      border: none;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="Services.html">Services</a>
  <a href="About.html">About Us</a>
  <a href="Contact.html">Contact Us</a>
  <a href="Partners.html">Our Partners</a>
</nav>

<div class="container">
  <h1>Request Here</h1>

  <form id="booking-form">
    <input type="text" name="name" placeholder="Your Full Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <textarea name="message" placeholder="Your Message" required></textarea>
    <button type="submit">Submit</button>
  </form>
</div>

<script>
  emailjs.init("2D90Dl0QS7IfvW3tN");

  document.getElementById("booking-form").addEventListener("submit", function (e) {
    e.preventDefault();

    emailjs.sendForm(
      "service_v4ktjuu",
      "template_kx3eo28",
      this
    ).then(
      function () {
        alert("Message sent successfully!");
      },
      function (error) {
        console.error("EmailJS Error:", error);
        alert("Email failed – check console.");
      }
    );
  });
</script>

</body>
</html>
