
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>

  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <script>
    (function () {
      emailjs.init("JP-Lzv6mA1TowkcYJ"); // 👈 replace with your EmailJS public key
    })();
  </script>

  <style>
    form {
      max-width: 400px;
      margin: auto;
      font-family: Arial, sans-serif;
    }
    input, textarea, button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
    }
    button {
      background: #0078d4;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #005a9e;
    }
 nav {
      background: linear-gradient(90deg, #0b3c5d, #d7263d);
      padding: 14px;
      text-align: center;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: 600;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: #fff;
      padding: 40px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #e91e63;
      border: none;
      color: #fff;
      cursor: pointer;
    }

  </style>
</head>
<body>
<nav>
  <a href="Home.html">Home</a>
  <a href="Services.html">Services</a>
  <a href="About.html">About Us</a>
  <a href="Contact.html">Contact Us</a>
  <a href="Partners.html">Our Partners</a>
</nav>
<div >
  <form id="contact-form">
    <h2>Send Us A Message</h2>

    <input type="text" name="name" placeholder="Your Name" required />
    <input type="email" name="email" placeholder="Your Email" required />
    <input type="tel" name="phone" placeholder="Your Phone" />
    <textarea name="message" placeholder="Your Message" rows="5" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</div>
  <script>
    document.getElementById("contact-form").addEventListener("submit", function (event) {
      event.preventDefault();

      emailjs.sendForm(
        "service_uzgv71w",   // 👈 replace
        "template_kx3eo28",  // 👈 replace
        this
      ).then(
        function () {
          alert("Message sent successfully!");
          document.getElementById("contact-form").reset();
        },
        function (error) {
          alert("Failed to send message.\n" + error.text);
        }
      );
    });
  </script>

</body>
</html>
